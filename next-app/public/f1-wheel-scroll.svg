<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="rimFace" x1="22" y1="18" x2="78" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset=".45" stop-color="#d5dbe4"/>
      <stop offset="1" stop-color="#8b939f"/>
    </linearGradient>
    <linearGradient id="spokeFace" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b7bec8"/>
    </linearGradient>
    <radialGradient id="hubFace" cx="40%" cy="34%" r="68%">
      <stop stop-color="#3a4048"/>
      <stop offset="1" stop-color="#101215"/>
    </radialGradient>
  </defs>

  <!-- 1 · Machined rim barrel (large centre — ~66% of wheel) -->
  <circle cx="50" cy="50" r="32" fill="#3a4048"/>
  <circle cx="50" cy="50" r="32" fill="url(#rimFace)"/>

  <!-- 2 · Ten thin spokes on dark base -->
  <g fill="url(#spokeFace)">
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z"/>
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z" transform="rotate(36 50 50)"/>
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z" transform="rotate(72 50 50)"/>
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z" transform="rotate(108 50 50)"/>
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z" transform="rotate(144 50 50)"/>
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z" transform="rotate(180 50 50)"/>
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z" transform="rotate(216 50 50)"/>
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z" transform="rotate(252 50 50)"/>
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z" transform="rotate(288 50 50)"/>
    <path d="M 48.8 38.5 46.8 19.5 53.2 19.5 51.2 38.5Z" transform="rotate(324 50 50)"/>
  </g>

  <circle cx="50" cy="50" r="32" stroke="#ffffff" stroke-opacity=".35" stroke-width=".55"/>
  <circle cx="50" cy="50" r="29.5" stroke="#000000" stroke-opacity=".12" stroke-width=".45"/>

  <!-- 3 · Centre lock nut -->
  <circle cx="50" cy="50" r="11.5" fill="url(#hubFace)" stroke="#616872" stroke-width=".45"/>
  <circle cx="50" cy="50" r="9" fill="#0a0b0d" stroke="#343a42" stroke-width=".35"/>
  <path fill="#ffffff" d="M50 37.5 44.5 47.5h2.8v6.2h5.4v-6.2h2.8z"/>

  <!-- 4 · Black rubber tyre wraps the rim (sidewall + tread) -->
  <circle cx="50" cy="50" r="40.5" stroke="#0b0b0b" stroke-width="17" stroke-linecap="round"/>

  <!-- 5 · Medium-compound stripe — thin full ring on sidewall (not a broken arc) -->
  <circle cx="50" cy="50" r="41.8" stroke="#F2C300" stroke-width="3.2"/>

  <!-- 6 · Sidewall branding (flat text reads better at small size) -->
  <text
    x="50"
    y="17.5"
    text-anchor="middle"
    fill="#F2C300"
    font-family="Arial, Helvetica, sans-serif"
    font-size="5.6"
    font-weight="800"
    letter-spacing=".85"
  >PIRELLI</text>
  <text
    x="50"
    y="86"
    text-anchor="middle"
    fill="#F2C300"
    font-family="Arial, Helvetica, sans-serif"
    font-size="4.8"
    font-weight="800"
    letter-spacing=".55"
    transform="rotate(180 50 86)"
  >P ZERO</text>

  <!-- 7 · Outer tread edge -->
  <circle cx="50" cy="50" r="48.5" stroke="#050505" stroke-width=".8"/>
</svg>
