version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# F1 Analytics Hub — Docker Compose
#
# IMPORTANT: Before running, create a .env file in this directory with:
#   MONGO_ROOT_USER=<your-chosen-username>
#   MONGO_ROOT_PASSWORD=<strong-random-password>
#   REDIS_PASSWORD=<strong-random-password>
#
# Never hardcode credentials in this file.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"  # bind to localhost only — not exposed to internet
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - f1-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # bind to localhost only
    volumes:
      - redis_data:/data
    networks:
      - f1-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  # Background support service (polling → Redis)
  backend:
    build: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_SERVICE=gmail
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - redis
    networks:
      - f1-network

volumes:
  mongodb_data:
  redis_data:

networks:
  f1-network:
    driver: bridge
